# Config for variants/cute_reduce_v7/kernel.py
# Deps: torch + triton + tilelang + apache-tvm-ffi + nvidia-cutlass-dsl (--no-deps)
# Best reported: 75.59 ± 0.11x variance-check 3 on CUDA 13.2 (2026-04-22, v10 session);
# AB-compare vs cute_reduce_v6 same Modal container: +0.45x (0.6%).
# Canonical abs kernel latency (CUDA 13.2, 2026-04-22): ~7.4 µs mean (same as v6).
[solution]
name = "cute_reduce_v7"
definition = "dsa_sparse_attention_h16_ckv512_kpe64_topk2048_ps64"
author = "FISAC"

[build]
language = "python"
entry_point = "kernel.py::run"
destination_passing_style = false

# NOTE: correctness requirement, not a perf knob. Same constraint as v6:
# the kernel's `_last_si_ptr == si_ptr` fast-path (inside run()) aliases
# across workloads in a persistent benchmark runner when PyTorch's allocator
# reuses sparse_indices addresses between workloads — graph replay then uses
# stale qn/qp/ckv/kpe addresses baked into the captured graph. Isolated
# runner (1 process per workload) prevents this. Verified 4/23 silent
# INCORRECT_NUMERICAL failures on CUDA 13.2 persistent runner without this
# flag [verified: 2026-04-20, ako4fib-run-dsa-sparse-b200-v8 iter-1].
[benchmark]
use_isolated_runner = true
